# 高考学习系统 - Nginx 配置（仅 HTTP，用于首次部署）
server {
    listen 80;
    server_name www.ycx.com ycx.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /opt/learning-system/config;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /tools {
        alias /opt/learning-system/config/tools.html;
        default_type text/html;
    }

    location /mistake/ {
        alias /opt/learning-system/mistake_system/mistake-system-desktop/dist/;
        try_files $uri $uri/ /mistake/index.html;

        location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /account/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ /\. {
        deny all;
    }
}
