# HTTP 服务器 - 纯 HTTP 配置
server {
    listen 80;
    server_name localhost _ 192.168.1.72 116.8.1.195 www.ycx.com ycx.com;

    # SSL 证书验证目录（保留用于可能的未来使用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN";

    # 日志
    access_log /var/log/nginx/learning-system-access.log;
    error_log /var/log/nginx/learning-system-error.log;

    # 学习系统主页 - 反向代理到 Python 后端
    location = / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 工具中心
    location = /tools {
        alias /opt/learning-system/config/tools.html;
        default_type text/html;
    }

    # 错题系统
    location /mistake/ {
        alias /opt/learning-system/mistake_system/mistake-system-desktop/dist/;
        try_files $uri $uri/ /mistake/index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 账号 API
    location /account/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
