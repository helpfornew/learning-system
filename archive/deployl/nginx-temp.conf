# HTTP 服务器 - 初始配置（SSL 证书申请前使用）
server {
    listen 80;
    server_name www.ycx.com ycx.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务器 - 使用默认证书（SSL 证书申请前临时使用）
server {
    listen 443 ssl http2;
    server_name www.ycx.com ycx.com;

    # 临时使用自签名证书让 nginx 启动
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location = / {
        root /opt/learning-system/config;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /tools {
        alias /opt/learning-system/config/tools.html;
        default_type text/html;
    }

    location /mistake/ {
        alias /opt/learning-system/mistake_system/mistake-system-desktop/dist/;
        try_files $uri $uri/ /mistake/index.html;

        location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /account/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ /\. {
        deny all;
    }
}
