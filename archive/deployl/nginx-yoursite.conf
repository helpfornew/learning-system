# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name www.ycx.com ycx.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.ycx.com$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name www.ycx.com ycx.com;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/www.ycx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.ycx.com/privkey.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN";

    # 日志
    access_log /var/log/nginx/learning-system-access.log;
    error_log /var/log/nginx/learning-system-error.log;

    # 学习系统主页
    location = / {
        root /opt/learning-system/config;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 工具中心
    location = /tools {
        alias /opt/learning-system/config/tools.html;
        default_type text/html;
    }

    # 错题系统
    location /mistake/ {
        alias /opt/learning-system/mistake_system/mistake-system-desktop/dist/;
        try_files $uri $uri/ /mistake/index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 账号 API
    location /account/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
