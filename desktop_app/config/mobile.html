<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>高考学习系统 · 移动版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #667eea;
            min-height: 100vh;
            padding: 0;
            padding-bottom: 70px;
        }

        /* ===== 登录页面 ===== */
        #loginPage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #667eea;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #loginPage.active { display: flex; }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .login-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .login-form input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .login-form input:focus {
            border-color: #667eea;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .login-message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 14px;
            display: none;
        }
        .login-message.error { background: #fee; color: #c00; display: block; }
        .login-message.success { background: #efe; color: #060; display: block; }

        .login-tip {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 15px;
        }

        /* ===== 主容器 ===== */
        #mainContainer { display: none; }
        #mainContainer.active { display: block; }

        /* ===== 头部 ===== */
        .header {
            background: #ffffff;
            border-radius: 0 0 20px 20px;
            padding: 15px 20px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: #667eea;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-info {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header-badge {
            background: #f0f3ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* ===== 当前任务卡片 ===== */
        .current-task-card {
            margin: 15px;
            background: #667eea;
            border-radius: 16px;
            padding: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .current-task-label {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .current-task-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .current-task-time {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .current-task-next {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.85rem;
        }

        .current-task-next strong { color: #fff; }

        /* ===== 内容区域 ===== */
        .content {
            padding: 0 15px;
        }

        /* ===== 课表卡片 ===== */
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
        }

        /* ===== 时间表 ===== */
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .schedule-item {
            display: grid;
            grid-template-columns: 55px 1fr 50px;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: #f8f9ff;
            border-left: 3px solid #667eea;
            transition: background-color 0.2s ease, opacity 0.2s ease;
        }

        .schedule-item.current {
            background: #667eea;
            color: white;
            border-left-color: #fff;
        }

        .schedule-item.completed {
            opacity: 0.6;
        }

        .schedule-time {
            font-weight: 700;
            font-size: 0.8rem;
            color: #0b2c5f;
            font-family: monospace;
        }

        .schedule-item.current .schedule-time { color: white; }

        .schedule-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2f50;
            line-height: 1.3;
        }

        .schedule-item.current .schedule-title { color: white; }

        .schedule-desc {
            font-size: 0.7rem;
            color: #666;
            margin-top: 2px;
        }

        .schedule-item.current .schedule-desc { color: rgba(255,255,255,0.8); }

        .schedule-tag {
            justify-self: end;
            background: #e2e9ff;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2d4680;
        }

        .schedule-item.current .schedule-tag {
            background: rgba(255,255,255,0.3);
            color: white;
        }

        /* ===== 统计卡片 ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            margin-top: 4px;
        }

        /* ===== 快捷操作 ===== */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px;
        }

        .quick-action-btn {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .quick-action-btn:active { transform: scale(0.95); }

        .quick-action-icon {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .quick-action-label {
            font-size: 0.75rem;
            color: #666;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            box-shadow: 0 -2px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: color 0.2s ease;
            color: #999;
        }

        .nav-item.active {
            color: #667eea;
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* ===== 用户信息卡片 ===== */
        .user-info-card {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
            color: white;
        }

        .user-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
        }

        .logout-btn {
            margin-top: 12px;
            padding: 10px 24px;
            background: #f093fb;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage">
        <div class="login-card">
            <div class="login-title">高考学习系统</div>
            <div class="login-tabs">
                <div class="login-tab active" data-type="login">登录</div>
                <div class="login-tab" data-type="register">注册</div>
            </div>

            <form class="login-form" id="loginForm">
                <input type="text" id="loginUsername" placeholder="用户名" required>
                <input type="password" id="loginPassword" placeholder="密码" required>
                <div class="login-message" id="loginMessage"></div>
                <button type="submit" class="login-btn">登 录</button>
            </form>

            <form class="login-form" id="registerForm" style="display: none;">
                <input type="text" id="regUsername" placeholder="用户名" required>
                <input type="password" id="regPassword" placeholder="密码" required>
                <input type="email" id="regEmail" placeholder="邮箱（可选）">
                <input type="text" id="regInviteCode" placeholder="邀请码（如有）">
                <div class="login-message" id="registerMessage"></div>
                <button type="submit" class="login-btn">注 册</button>
            </form>

            <div class="login-tip">好好学习，天天向上！</div>
        </div>
    </div>

    <!-- 主容器 -->
    <div id="mainContainer">
        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <h1>高考学习系统</h1>
                <div class="header-actions">
                    <button class="header-btn" id="userBtn" onclick="toggleUserInfo()"> </button>
                </div>
            </div>
            <div class="header-info">
                <span class="header-badge" id="dayTypeBadge">单日</span>
                <span class="header-badge" id="weekTypeBadge">单周</span>
                <span class="header-badge" id="countdownBadge">距高考 90 天</span>
            </div>
        </div>

        <!-- 用户信息卡片 -->
        <div class="user-info-card" id="userInfoCard">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-name" id="userName">用户名</div>
            <div style="color: #666; font-size: 0.9rem; margin-top: 6px;" id="userEmail"></div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>

        <!-- 当前任务 -->
        <div class="current-task-card" id="currentTask">
            <div class="current-task-label">当前任务</div>
            <div class="current-task-name" id="currentTaskName">加载中...</div>
            <div class="current-task-time" id="currentTaskTime">--:-- - --:--</div>
            <div class="current-task-next" id="nextTaskContainer">
                下一个：<strong id="nextTaskName">--</strong>
                <span style="margin-left: 8px;" id="nextTaskTime">--:--</span>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="quick-actions">
            <button class="quick-action-btn" onclick="location.href='schedule-view.html'">
                <div class="quick-action-icon"></div>
                <div class="quick-action-label">本周日程</div>
            </button>
            <button class="quick-action-btn" onclick="openMistakeSystem()">
                <div class="quick-action-icon"></div>
                <div class="quick-action-label">错题本</div>
            </button>
            <button class="quick-action-btn" onclick="location.href='mistake.html'">
                <div class="quick-action-icon"></div>
                <div class="quick-action-label">录错题</div>
            </button>
            <button class="quick-action-btn" onclick="location.href='analysis.html'">
                <div class="quick-action-icon"></div>
                <div class="quick-action-label">数据分析</div>
            </button>
        </div>

        <!-- 今日课表 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">今日课表</span>
            </div>
            <div class="card-body" id="scheduleList">
                <div style="text-align: center; color: #999; padding: 40px;">
                    加载课表中...
                </div>
            </div>
        </div>

        <!-- 学习统计 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">今日学习</span>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="studyHours">0</div>
                    <div class="stat-label">学习小时</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedTasks">0</div>
                    <div class="stat-label">完成任务</div>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home')">
                <span class="nav-icon"></span>
                <span class="nav-label">首页</span>
            </div>
            <div class="nav-item" onclick="switchTab('schedule')">
                <span class="nav-icon"></span>
                <span class="nav-label">课表</span>
            </div>
            <div class="nav-item" onclick="openMistakeSystem()">
                <span class="nav-icon"></span>
                <span class="nav-label">错题</span>
            </div>
            <div class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon"></span>
                <span class="nav-label">我的</span>
            </div>
        </div>
    </div>

    <script>
        // API 基础地址
        const isElectron = typeof window !== 'undefined' && window.process && window.process.type;
        let ACCOUNT_API_BASE, API_BASE, MISTAKE_SYSTEM_URL;

        if (isElectron) {
            ACCOUNT_API_BASE = 'http://localhost:8080/account';
            API_BASE = 'http://localhost:8080';
            MISTAKE_SYSTEM_URL = 'http://localhost:8080/mistake/';
        } else {
            const hostname = window.location.hostname || 'localhost';
            ACCOUNT_API_BASE = 'http://' + hostname + ':8080/account';
            API_BASE = 'http://' + hostname + ':8080';
            MISTAKE_SYSTEM_URL = 'http://' + hostname + ':8080/mistake/';
        }

        // ===== 登录验证 =====
        let currentUser = null;

        function checkLoginStatus() {
            const token = localStorage.getItem('auth_token');
            const userInfo = localStorage.getItem('user_info');
            if (token && userInfo) {
                currentUser = JSON.parse(userInfo);
                showMainPage();
            } else {
                showLoginPage();
            }
        }

        function showLoginPage() {
            document.getElementById('loginPage').classList.add('active');
            document.getElementById('mainContainer').style.display = 'none';
        }

        function showMainPage() {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('mainContainer').classList.add('active');
            document.getElementById('mainContainer').style.display = 'block';
            if (currentUser) {
                document.getElementById('userName').textContent = currentUser.username;
                document.getElementById('userEmail').textContent = currentUser.email || '';
                document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
            }
            loadData();
        }

        function toggleUserInfo() {
            const card = document.getElementById('userInfoCard');
            card.style.display = card.style.display === 'block' ? 'none' : 'block';
        }

        function logout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_info');
            location.reload();
        }

        // 登录表单切换
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const type = this.dataset.type;
                document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
                document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
            });
        });

        // 登录提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const msgEl = document.getElementById('loginMessage');

            msgEl.style.display = 'none';

            try {
                const resp = await fetch(`${ACCOUNT_API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();

                if (data.success) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                    currentUser = data.user;
                    showMainPage();
                } else {
                    msgEl.textContent = data.message || '登录失败';
                    msgEl.className = 'login-message error';
                }
            } catch (err) {
                msgEl.textContent = '网络错误，请稍后重试';
                msgEl.className = 'login-message error';
            }
        });

        // 注册提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value.trim();
            const inviteCode = document.getElementById('regInviteCode').value.trim();
            const msgEl = document.getElementById('registerMessage');

            try {
                const resp = await fetch(`${ACCOUNT_API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email, invite_code: inviteCode })
                });
                const data = await resp.json();

                if (data.success) {
                    msgEl.textContent = '注册成功，请登录';
                    msgEl.className = 'login-message success';
                    setTimeout(() => {
                        document.querySelector('.login-tab[data-type="login"]').click();
                    }, 1500);
                } else {
                    msgEl.textContent = data.message || '注册失败';
                    msgEl.className = 'login-message error';
                }
            } catch (err) {
                msgEl.textContent = '网络错误，请稍后重试';
                msgEl.className = 'login-message error';
            }
        });

        // ===== 数据加载 =====
        function loadData() {
            renderDetailedSchedule();
            updateCountdown();
        }

        // ===== 日期信息 =====
        function getDateInfo() {
            const now = new Date();
            const dayIndex = now.getDay();

            const startOfTerm = new Date(2025, 2, 1);
            const diffDays = Math.floor((now - startOfTerm) / (1000*60*60*24));
            let weekOfTerm = Math.floor(diffDays / 7) + 1;
            if (weekOfTerm < 1) weekOfTerm = 1;
            if (weekOfTerm > 6) weekOfTerm = ((weekOfTerm-1) % 6) + 1;

            let dayType = '周测日';
            let mathOrPhysics = '周测';
            if (dayIndex === 1 || dayIndex === 3 || dayIndex === 5) {
                dayType = '单日 (数学)';
                mathOrPhysics = '数学';
            } else if (dayIndex === 2 || dayIndex === 4 || dayIndex === 6) {
                dayType = '双日 (物理)';
                mathOrPhysics = '物理';
            } else {
                dayType = '周日·周测';
                mathOrPhysics = '周测';
            }

            const weekType = (weekOfTerm % 2 === 1) ? '单周·政治' : '双周·语文';

            const testSubjects = [
                { sub1: '英语', sub2: '化学' },
                { sub1: '数学', sub2: '物理' },
                { sub1: '语文', sub2: '英语' },
                { sub1: '化学', sub2: '政治' },
                { sub1: '数学', sub2: '政治' },
                { sub1: '全科模拟', sub2: '全科模拟' }
            ];
            const weekIdx = (weekOfTerm - 1) % 6;

            return { dayIndex, dayType, mathOrPhysics, weekOfTerm, weekType, testSub1: testSubjects[weekIdx].sub1, testSub2: testSubjects[weekIdx].sub2 };
        }

        // ===== 构建时间表 =====
        function buildDetailedSchedule() {
            const info = getDateInfo();
            const isSunday = (info.dayIndex === 0);

            return [
                { start: 7.0, end: 7.333, title: '起床洗漱', desc: '清醒 + 喝水', subject: '起床', tag: 'daily' },
                { start: 7.333, end: 7.667, title: '晨间拉伸', desc: '猫牛式/下犬式/肩颈', subject: '锻炼', tag: 'exercise' },
                { start: 7.667, end: 8.0, title: '英语磨耳朵', desc: '纯听，唤醒语感', subject: '英语', tag: '学习' },
                { start: 8.0, end: 9.0, title: '早餐 + 备菜', desc: '做饭/吃 + 准备中午食材', subject: '早餐', tag: 'daily' },
                { start: 9.0, end: 10.3, title: isSunday ? `周测·${info.testSub1}` : '化学分块输入', desc: isSunday ? `周测 70 分钟：${info.testSub1}` : '1 概念 +3 例题 +4 练习', subject: isSunday ? '周测' : '化学', tag: '学习' },
                { start: 10.3, end: 10.5, title: '休息', desc: '喝水 + 走动', subject: '休息', tag: '休息' },
                { start: 10.5, end: 12.0, title: isSunday ? `周测·${info.testSub2}` : `${info.mathOrPhysics}刻意练习`, desc: isSunday ? `周测 70 分钟：${info.testSub2}` : '模型思维：画示意图 + 边界条件', subject: isSunday ? '周测' : info.mathOrPhysics, tag: '学习' },
                { start: 12.0, end: 13.0, title: '做饭 + 午餐 + 洗碗', desc: '简单烹饪', subject: '午餐', tag: 'daily' },
                { start: 13.0, end: 14.0, title: '午休', desc: '休息', subject: '午休', tag: '休息' },
                { start: 14.0, end: 15.0, title: 'AI 编程项目', desc: 'KDnuggets 文档 + 跑代码', subject: 'AI 项目', tag: '学习' },
                { start: 15.0, end: 15.167, title: '项目术语本', desc: '记下 3-5 个关键词', subject: '英语', tag: '学习' },
                { start: 15.167, end: 16.3, title: isSunday ? '周测复盘' : `${info.mathOrPhysics}错题复盘`, desc: isSunday ? '周测总结' : '盲做→对比→费曼', subject: isSunday ? '周测' : info.mathOrPhysics, tag: '学习' },
                { start: 16.3, end: 17.0, title: '微运动 + 深呼吸', desc: '靠墙拉伸', subject: '锻炼', tag: 'exercise' },
                { start: 17.0, end: 18.3, title: getAfternoonSubject(info.dayIndex, info.weekType), desc: getAfternoonDesc(info.dayIndex, info.weekType), subject: getAfternoonSubjectName(info.dayIndex, info.weekType), tag: '学习' },
                { start: 18.3, end: 19.5, title: '做饭 + 晚餐 + 洗碗', desc: '简单烹饪', subject: '晚餐', tag: 'daily' },
                { start: 19.5, end: 20.0, title: '彻底放空', desc: '无手机', subject: '放空', tag: '休息' },
                { start: 20.0, end: 21.0, title: '化学反刍', desc: '检索练习', subject: '化学', tag: '学习' },
                { start: 21.0, end: 21.25, title: '休息', desc: '小憩', subject: '休息', tag: '休息' },
                { start: 21.25, end: 22.0, title: '英语单词质检', desc: '只背项目遇到的词 + 高考核心词', subject: '英语', tag: '学习' },
                { start: 22.0, end: 22.5, title: '复盘 + 明日计划', desc: '费曼总结', subject: '复盘', tag: '学习' },
                { start: 22.5, end: 22.833, title: '费曼总结', desc: '用英文说 1-2 句', subject: '英语', tag: '学习' },
                { start: 22.833, end: 23.167, title: '洗漱', desc: '', subject: '洗漱', tag: 'daily' },
                { start: 23.167, end: 23.5, title: '冥想', desc: '正念/身体扫描', subject: '冥想', tag: 'exercise' },
                { start: 23.5, end: 24.0, title: '睡觉', desc: '23:30 休息', subject: '睡觉', tag: '休息' },
            ];
        }

        function getAfternoonSubject(dayIndex, weekType) {
            if (dayIndex === 0) return '周测总结';
            return weekType === '单周·政治' ? '政治·术语 + 选择题' : '语文·文言文/古诗/素材';
        }

        function getAfternoonDesc(dayIndex, weekType) {
            if (dayIndex === 0) return '周测总结与复盘';
            return weekType === '单周·政治' ? '背 5 术语 +10 选择题' : '文言文精读/古诗鉴赏/作文素材';
        }

        function getAfternoonSubjectName(dayIndex, weekType) {
            if (dayIndex === 0) return '周测';
            return weekType === '单周·政治' ? '政治' : '语文';
        }

        // ===== 时间格式化 =====
        function formatTime(decimal) {
            const hours = Math.floor(decimal);
            const minutes = Math.round((decimal - hours) * 60);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
        }

        // ===== 渲染课表 =====
        function renderDetailedSchedule() {
            const schedule = buildDetailedSchedule();
            const info = getDateInfo();
            const now = new Date();
            const currentDec = now.getHours() + now.getMinutes() / 60;

            // 更新徽章
            document.getElementById('dayTypeBadge').textContent = `${info.dayType} · 第${info.weekOfTerm}周`;
            document.getElementById('weekTypeBadge').textContent = info.weekType;

            // 找当前和下一个任务
            let currentTask = null;
            let nextTask = null;

            for (let i = 0; i < schedule.length; i++) {
                const item = schedule[i];
                if (currentDec >= item.start && currentDec < item.end) {
                    currentTask = item;
                    nextTask = schedule[i + 1] || null;
                    break;
                }
                if (!currentTask && currentDec < item.start) {
                    nextTask = item;
                }
            }

            // 更新当前任务卡片
            const currentTaskEl = document.getElementById('currentTask');
            const currentTaskNameEl = document.getElementById('currentTaskName');
            const currentTaskTimeEl = document.getElementById('currentTaskTime');
            const nextTaskNameEl = document.getElementById('nextTaskName');
            const nextTaskTimeEl = document.getElementById('nextTaskTime');

            if (currentTask) {
                currentTaskNameEl.textContent = currentTask.title;
                currentTaskTimeEl.textContent = `${formatTime(currentTask.start)} - ${formatTime(currentTask.end)}`;
                currentTaskEl.style.background = '#667eea';
                if (nextTask) {
                    nextTaskNameEl.textContent = nextTask.title;
                    nextTaskTimeEl.textContent = formatTime(nextTask.start);
                }
            } else if (nextTask) {
                currentTaskNameEl.textContent = '休息时间';
                currentTaskTimeEl.textContent = '放松一下~';
                currentTaskEl.style.background = '#11998e';
                nextTaskNameEl.textContent = nextTask.title;
                nextTaskTimeEl.textContent = formatTime(nextTask.start);
            } else {
                currentTaskNameEl.textContent = '今日学习结束';
                currentTaskTimeEl.textContent = '好好休息!';
                currentTaskEl.style.background = '#f093fb';
                nextTaskNameEl.textContent = '明天继续';
                nextTaskTimeEl.textContent = '';
            }

            // 渲染时间表
            const container = document.getElementById('scheduleList');
            let html = '<div class="schedule-list">';

            schedule.forEach((item) => {
                const completed = currentDec >= item.end;
                const isCurrent = currentDec >= item.start && currentDec < item.end;

                let itemClass = 'schedule-item';
                if (isCurrent) itemClass += ' current';
                else if (completed) itemClass += ' completed';

                let tagClass = 'schedule-tag';
                if (item.tag === 'exercise') tagClass += ' exercise';
                else if (item.tag === '休息' || item.tag === 'rest') tagClass += ' rest';
                else if (item.tag === 'daily') tagClass += ' daily';

                html += `
                    <div class="${itemClass}">
                        <span class="schedule-time">${formatTime(item.start)}</span>
                        <div>
                            <div class="schedule-title">${item.title}</div>
                            <div class="schedule-desc">${item.desc}</div>
                        </div>
                        <span class="${tagClass}">${item.subject}</span>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;

            // 更新学习统计
            updateStats(schedule, currentDec);
        }

        // ===== 更新统计 =====
        function updateStats(schedule, currentDec) {
            const info = getDateInfo();
            const completedTasks = schedule.filter(item => currentDec >= item.end && item.tag === '学习').length;
            const totalHours = schedule.filter(item => item.tag === '学习').reduce((acc, item) => acc + (item.end - item.start), 0);

            document.getElementById('completedTasks').textContent = completedTasks;
            document.getElementById('studyHours').textContent = totalHours.toFixed(1);
        }

        // ===== 更新倒计时 =====
        function updateCountdown() {
            const gaokaoDate = new Date('2026-06-07T00:00:00');
            const now = new Date();
            const diffTime = gaokaoDate - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('countdownBadge').textContent = `距高考 ${diffDays > 0 ? diffDays : 0} 天`;
        }

        // ===== 快捷操作 =====
        function openMistakeSystem() {
            window.location.href = MISTAKE_SYSTEM_URL;
        }

        function switchTab(tab) {
            if (tab === 'schedule') {
                window.location.href = 'schedule-view.html';
            } else if (tab === 'profile') {
                toggleUserInfo();
            }
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
    </script>
