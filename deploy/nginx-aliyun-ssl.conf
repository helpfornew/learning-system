# Nginx 配置 - 高考学习系统 (阿里云 SSL 证书版)
# 使用方法见 deploy/阿里云证书配置说明.md

# ============ 配置说明 ============
# 1. 将阿里云证书文件上传到 /etc/nginx/ssl/ 目录
# 2. 修改下方的 server_name 为你的域名
# 3. 确保证书路径正确
# 4. 测试配置：nginx -t
# 5. 重启 Nginx：systemctl restart nginx
# ==================================

# HTTP 重定向到 HTTPS
server {
    listen 80;
    # 【必填】修改为你的域名
    server_name gkzxtools.xyz www.gkzxtools.xyz;

    # 所有请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器配置
server {
    listen 443 ssl http2;
    # 【必填】修改为你的域名
    server_name gkzxtools.xyz www.gkzxtools.xyz;

    # ===================================
    # 【必填】阿里云 SSL 证书配置
    # ===================================
    # 将阿里云下载的证书文件上传到 /etc/nginx/ssl/ 目录
    # 通常阿里云提供两种格式：Nginx 格式或 PEM 格式

    # 方式1：使用阿里云 Nginx 格式证书（推荐）
    # ssl_certificate /etc/nginx/ssl/gkzxtools.xyz.pem;
    # ssl_certificate_key /etc/nginx/ssl/gkzxtools.xyz.key;

    # 方式2：使用阿里云 PEM 格式证书（.crt 和 .key 分开）
    # ssl_certificate /etc/nginx/ssl/cert.crt;
    # ssl_certificate_key /etc/nginx/ssl/cert.key;

    # 方式3：如果阿里云提供的是 .pem 和 .key 文件
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # ===================================
    # SSL 安全配置（阿里云证书通用配置）
    # ===================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 如果阿里云证书包含中间证书，确保配置正确
    # ssl_trusted_certificate /etc/nginx/ssl/chain.crt;

    # ===================================
    # 安全头配置
    # ===================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";

    # ===================================
    # 日志配置
    # ===================================
    access_log /var/log/nginx/learning-system-access.log;
    error_log /var/log/nginx/learning-system-error.log;

    # 上传文件大小限制（错题图片上传需要更大）
    client_max_body_size 20M;

    # 静态文件根目录
    set $static_root /opt/learning-system/config;
    set $mistake_root /opt/learning-system/mistake_system/mistake-system-desktop/dist;
    set $learning_root /opt/learning-system/learning-platform;
    set $wordcard_root /opt/learning-system/wordcard;

    # ===================================
    # 路由配置
    # ===================================

    # 错题系统静态资源（js/css/图片）
    location /mistake/assets/ {
        alias /opt/learning-system/mistake_system/mistake-system-desktop/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /tools {
        alias /opt/learning-system/config/tools.html;
        default_type text/html;
    }

    # 学习系统主页
    location = / {
        root $static_root;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 错题系统前端（SPA 路由支持）
    location /mistake/ {
        alias $mistake_root/;
        index index.html;
        try_files $uri $uri/ /mistake/index.html;

        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 学习平台前端（SPA 路由支持）
    location /learning/ {
        alias $learning_root/;
        index index.html;
        try_files $uri $uri/ /learning/index.html;

        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 单词卡前端（SPA 路由支持）
    location /wordcard/ {
        alias $wordcard_root/;
        index index.html;
        try_files $uri $uri/ /wordcard/index.html;

        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 图片资源目录
    location /images/ {
        alias /opt/learning-system/images/;
        expires 1M;
        add_header Cache-Control "public";
    }

    # 静态资源（CSS, JS, images 等）
    location /static/ {
        alias /opt/learning-system/static/;
        expires 1M;
        add_header Cache-Control "public";
    }

    # ===================================
    # API 反向代理
    # ===================================

    # 统一 API（错题、学习时间、配置、工具等）
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 账号 API
    location /account/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 学习平台 API
    location /learning/api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点（用于负载均衡器）
    location = /health {
        proxy_pass http://127.0.0.1:8080/api/health;
        access_log off;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
