<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本周日程 - 高考学习系统</title>

    <link rel="stylesheet" href="/static/navbar.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            color: #fff;
        }

        .back-btn {
            padding: 12px 24px;
            background: #777;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
        }

        .back-btn:hover {
            opacity: 0.9;
            box-shadow: 0 5px 20px rgba(108,92,231,0.3);
        }

        .week-info {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .week-badge {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 星期卡片网格 */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .day-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.2s ease, background-color 0.2s ease;
        }

        .day-card:hover {
            background: rgba(255,255,255,0.08);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }

        .day-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .day-type {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .day-type.单周 { background: rgba(255,255,255,0.08); color: #999999; }
        .day-type.双周 { background: rgba(255,255,255,0.08); color: #999999; }
        .day-type.单日 { background: rgba(255,255,255,0.08); color: #666666; }
        .day-type.双日 { background: rgba(255,255,255,0.08); color: #555555; }
        .day-type.周测 { background: rgba(255,255,255,0.08); color: #777777; }
        .day-type.刷题日 { background: #888; color: white; }
        .day-type.分析日 { background: #555; color: #fff; }
        .day-type.突破日 { background: #777; color: white; }
        .day-type.复盘日 { background: #666; color: white; }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
        }

        .schedule-item {
            display: grid;
            grid-template-columns: 80px 1fr 70px;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border-left: 3px solid rgba(255,255,255,0.2);
            transition: opacity 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .schedule-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(3px);
        }

        .schedule-item.current {
            background: rgba(108,92,231,0.15);
            border-left-color: #777777;
            box-shadow: 0 2px 8px rgba(108,92,231,0.2);
        }

        .schedule-time {
            font-weight: 700;
            font-size: 0.85rem;
            color: #999999;
            font-family: 'JetBrains Mono', monospace;
        }

        .schedule-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
        }

        .schedule-desc {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 2px;
        }

        .schedule-tag {
            justify-self: end;
            background: rgba(255,255,255,0.08);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #999999;
        }

        .schedule-tag.exercise {
            background: rgba(255,255,255,0.08);
            color: #666666;
        }

        .schedule-tag.rest {
            background: rgba(255,107,107,0.2);
            color: #ff6b6b;
        }

            background: rgba(255,255,255,0.1);
            color: #aaa;
        }

        .schedule-tag.学习 {
            background: rgba(255,255,255,0.08);
            color: #999999;
        }

        /* 今天是第几天高亮 */
        .day-card.today {
            border: 2px solid #888;
            position: relative;
        }

        .day-card.today::before {
            content: '今天';
            position: absolute;
            top: -10px;
            right: 20px;
            background: #888;
            color: #1a1a2e;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* 滚动条样式 */
        .schedule-list::-webkit-scrollbar {
            width: 6px;
        }

        .schedule-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);

        }

        .schedule-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);

        .schedule-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);

            padding: 12px 24px;
            background: #777;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;

        .print-btn:hover {
            opacity: 0.9;
            box-shadow: 0 5px 20px rgba(108,92,231,0.3);

        @media print {

                color: #000;

                border: 1px solid #ddd;
            }
            .back-btn, .print-btn {
                display: none;
            }

        // API 基础地址
        const isElectron = typeof window !== 'undefined' && window.process && window.process.type;
        let API_BASE = isElectron ? 'http://localhost:8080' : '';

        // 星期名称
        const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        const dayIcons = ['', '', '', '', '', '', ''];

        // 获取日期信息
        function getDateInfo() {
            const now = new Date();
            const dayIndex = now.getDay();

            // 计算第几周 (从 3 月 1 日算起)
            const startOfTerm = new Date(2025, 2, 1);
            const diffDays = Math.floor((now - startOfTerm) / (1000*60*60*24));
            let weekOfTerm = Math.floor(diffDays / 7) + 1;
            if (weekOfTerm < 1) weekOfTerm = 1;
            if (weekOfTerm > 6) weekOfTerm = ((weekOfTerm-1) % 6) + 1;

            // 单双周判断
            const weekType = (weekOfTerm % 2 === 1) ? '单周·政治' : '双周·语文';

            return { dayIndex, weekOfTerm, weekType };
        }

        // 全局缓存用户自定义时间表
        let userSchedulesCache = null;

        // 从 API 加载整周时间表
        async function loadWeekSchedules() {
            if (userSchedulesCache !== null) {
                return userSchedulesCache;
            }
            
            try {
                const token = localStorage.getItem('auth_token');
                const response = await fetch(`${API_BASE}/api/schedule`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.success && result.data) {
                        userSchedulesCache = result.data;
                        return userSchedulesCache;
                    }
                }
            } catch (e) {
                console.log('[loadWeekSchedules] 加载失败:', e.message);
            }
            
            userSchedulesCache = {};
            return userSchedulesCache;
        }

        // 构建详细时间表 - 新7天周期 (2天刷题+1天分析+3天突破+1天复盘)
        async function buildDetailedSchedule(dayIndex, weekType) {
            // 检查是否有自定义时间表 (从缓存)
            const weekSchedules = await loadWeekSchedules();
            const dayKey = String(dayIndex);
            if (weekSchedules[dayKey] && weekSchedules[dayKey].length > 0) {
                return weekSchedules[dayKey].map(slot => ({
                    start: timeToDecimal(slot.start),
                    end: timeToDecimal(slot.end),
                    title: slot.title,
                    desc: slot.desc || '',
                    subject: slot.subject || slot.tag || '学习',
                    tag: slot.tag || '学习',
                    isCustom: true
                }));
            }

            // 根据星期返回对应的时间表

                case 1: return getMondaySchedule(); // 周一：刷题日
                case 2: return getTuesdaySchedule(); // 周二：刷题日
                case 3: return getWednesdaySchedule(); // 周三：分析日

        // 从缓存获取自定义时间表
        function getCustomScheduleForDay(dayIndex) {
            const dayKey = String(dayIndex);
            if (userSchedulesCache && userSchedulesCache[dayKey] && userSchedulesCache[dayKey].length > 0) {
                return userSchedulesCache[dayKey].map(slot => ({
                    start: timeToDecimal(slot.start),
                    end: timeToDecimal(slot.end),
                    title: slot.title,
                    desc: slot.desc || '',
                    subject: slot.subject || slot.tag || '学习',
                    tag: slot.tag || '学习'
                }));
            }
            return null;
        }

        function hasCustomSchedule(dayIndex) {
            const dayKey = String(dayIndex);
            return userSchedulesCache && userSchedulesCache[dayKey] && userSchedulesCache[dayKey].length > 0;
        }

        // 时间格式转换
        function timeToDecimal(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours + minutes / 60;
        }

        function formatTime(decimal) {
            const hours = Math.floor(decimal);
            const minutes = Math.round((decimal - hours) * 60);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
        }

        // 获取本周日期范围
        function getWeekDateRange() {
            const now = new Date();
            const day = now.getDay();
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - day);
            startOfWeek.setHours(0, 0, 0, 0);

            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);

            const startStr = `${startOfWeek.getMonth()+1}/${startOfWeek.getDate()}`;
            const endStr = `${endOfWeek.getMonth()+1}/${endOfWeek.getDate()}`;

            return `${startStr} - ${endStr}`;
        }

        // 渲染星期卡片 (异步)
        async function renderDayCard(dayIndex, isToday) {
            const { weekType } = getDateInfo();
            const schedule = await buildDetailedSchedule(dayIndex, weekType);
            const hasCustom = hasCustomSchedule(dayIndex);

            // 新7天周期类型判断
            let dayTypeClass = '刷题日';
            let dayTypeText = '刷题日';
            if (dayIndex === 1) {

                dayTypeText = '刷题日·英语+化学';
            } else if (dayIndex === 2) {
                dayTypeClass = '刷题日';

            } else if (dayIndex === 3) {
                dayTypeClass = '分析日';
                dayTypeText = '分析日·AI分析';
            } else if (dayIndex === 4) {
                dayTypeClass = '突破日';
                dayTypeText = '突破日·英语';
            } else if (dayIndex === 5) {
                dayTypeClass = '突破日';
                dayTypeText = '突破日·化学';
            } else if (dayIndex === 6) {
                dayTypeClass = '突破日';
                dayTypeText = '突破日·语政';
            } else if (dayIndex === 0) {
                dayTypeClass = '复盘日';
                dayTypeText = '复盘日·测验';
            }

            const now = new Date();
            const currentDec = now.getHours() + now.getMinutes() / 60;

            let html = `<div class="day-card ${isToday ? 'today' : ''}">`;
            const customBadge = hasCustom ? '<span style="background: #666; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin-left: 8px;">已自定义</span>' : '';
            html += `
                <div class="day-header">
                    <span class="day-title">${dayIcons[dayIndex]} ${dayNames[dayIndex]}${customBadge}</span>
                    <span class="day-type ${dayTypeClass}">${dayTypeText}</span>
                </div>
                <div class="schedule-list">
            `;

            schedule.forEach((item) => {
                const isCurrent = isToday && (currentDec >= item.start && currentDec < item.end);
                let tagClass = 'schedule-tag';
                if (item.tag === 'exercise') tagClass += ' exercise';
                else if (item.tag === '休息' || item.tag === 'rest') tagClass += ' rest';
                else if (item.tag === 'daily') tagClass += ' daily';

                html += `
                    <div class="schedule-item ${isCurrent ? 'current' : ''}">
                        <span class="schedule-time">${formatTime(item.start)}</span>
                        <div>
                            <div class="schedule-title">${item.title}</div>
                            <div class="schedule-desc">${item.desc}</div>
                        </div>
                        <span class="${tagClass}">${item.subject}</span>
                    </div>
                `;
            });

            html += `</div></div>`;
            return html;
        }

            const diffTime = gaokaoDate - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('countdownBadge').textContent = `距高考 ${diffDays > 0 ? diffDays : 0} 天`;

            // 渲染 7 天卡片

            let html = '';
            for (let i = 0; i < 7; i++) {
                html += await renderDayCard(i, i === dayIndex);
            }
            grid.innerHTML = html;
        }
